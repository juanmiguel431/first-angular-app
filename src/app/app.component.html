<app-header />

<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user
          [user]="user"
          (onSelect)="onUserSelect($event)"
          [active]="user.id === selectedUser?.id"
        />
      </li>
    }
  </ul>

  @if (selectedUser) {
    <app-user-tasks [user]="selectedUser" />
  } @else {
    <p id="no-user-selected">Select a user to see their tasks!</p>
  }
</main>
