<app-header />

<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user
          [user]="user"
          (onSelect)="onUserSelect($event)"
        />
      </li>
    }
  </ul>

  @if (user) {
    <app-user-tasks [user]="user" />
  } @else {
    <p id="no-user-selected">Select a user to see their tasks!</p>
  }
</main>
