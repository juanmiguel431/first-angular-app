

<form (ngSubmit)="onFormSubmit()">
  <label for="title">Title</label>
  <input
    type="text"
    name="title"
    id="title"
    [(ngModel)]="title"
  />

  <br>
  <br>

  <label for="summary">Summary</label>
  <input
    type="text"
    name="summary"
    id="summary"
    [(ngModel)]="summary"
  >


  <br>
  <br>

  <label for="dueDate">Due date</label>
  <input
    type="date"
    name="dueDate"
    id="dueDate"
    [(ngModel)]="dueDate"
  >

  <br>
  <br>

  <button (click)="onFormClose()">Close</button>

  <br>
  <br>

  <button type="submit">Submit</button>
</form>
