
<section id="tasks">
  <header>
    <h2>{{ user().name }}'s Tasks</h2>
    <menu>
      <button>Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of activeTasks(); track task.id) {
      <li>
        <app-user-task
          [task]="task"
          (onComplete)="onTaskCompleted($event)"
        />
      </li>
    }
  </ul>
</section>
